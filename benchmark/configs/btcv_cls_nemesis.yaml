experiment:
  name: "btcv_cls_nemesis"
  seed: 42

model:
  name: "nemesis"
  checkpoint_path: "pretrained/MAE_768_0.5.pt"   # download from HuggingFace: see pretrained/README.md
  num_classes: 8
  freeze_encoder: true          # linear probe (frozen encoder)
  embed_dim: 768
  depth: 6
  num_heads: 8
  num_maegic_tokens: 8

data:
  dataset: "btcv_cls"
  data_root: "data/BTCV"        # path to BTCV dataset root
  superpatch_size: [128, 128, 128]
  num_classes: 8
  label_fraction: 1.0
  batch_size: 8
  num_workers: 4
  presence_threshold: 100

training:
  max_epochs: 100
  val_every: 5
  lr: 0.001
  weight_decay: 0.00001
  warmup_epochs: 5
  amp: false
  grad_clip: 1.0
  early_stop_patience: 20
  cls_threshold: 0.5

output:
  dir: "results/btcv_cls_nemesis"
